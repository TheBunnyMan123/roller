<!DOCTYPE html>
<html>
  <head>
    <title>Dice Roller</title>
    <style>
        div {
          position: fixed;
          width: 100%;
          height: 100%;
          background: black;
        }
        span {
          position: fixed;
          text-align: center;
          width: 100%;
          color: white;
          font-size: 3rem;
          font-family: 'Times New Roman' serif;
        }
        #rolls {
          top: 1rem;
        }
        #result {
          top: 4.5rem;
        }
      </style>
  </head>
  <body>
      <div>
        <span id="rolls">Rolling...</span>
        <br>
        <span id="result">Rolling...</span>
      </div>
      
      <script src="script.js"></script>
  </body>
</html>
